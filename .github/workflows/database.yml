# Database Migration System V2 (docs/engineering/DATABASE_ENGINEERING.md).
#
# DORMANT until secrets are configured (Settings → Secrets and variables →
# Actions): SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD.
# Without them, every job up to and including `migration-lint` still runs
# and gates merges; `push-migrations` and `health-checks` are skipped (see
# their `if:` conditions) rather than failing noisily.
#
# Known gap, named rather than hidden (ETAPA 8): there is currently one
# Supabase project, not a separate staging + production pair. This pipeline
# pushes straight to that one project once secrets exist. Add a staging
# project and a second set of secrets before treating this as a real
# staging→production gate.
name: Database Migration Pipeline

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "database/**"
      - "scripts/db-*.ts"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  migration-lint:
    name: Migration hygiene (db:lint)
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run db:lint

  push-migrations:
    name: supabase db push
    runs-on: ubuntu-latest
    needs: migration-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Check Supabase secrets are configured
        id: secrets-check
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] || [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ] || [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Supabase secrets not configured — skipping db push. See docs/engineering/DATABASE_ENGINEERING.md."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Link project
        if: steps.secrets-check.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
      - name: Push migrations
        if: steps.secrets-check.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npx supabase db push

  health-checks:
    name: Post-deploy health checks
    runs-on: ubuntu-latest
    needs: push-migrations
    if: needs.push-migrations.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: List health checks (manual follow-up)
        run: |
          echo "Automated execution of database/health_checks/*.sql requires a"
          echo "direct Postgres connection (psql or a pg client), not yet wired"
          echo "into this workflow. Run them manually via the Supabase SQL"
          echo "Editor for now, or extend this job once a psql-in-CI approach"
          echo "is decided — see docs/engineering/DATABASE_ENGINEERING.md."
          ls database/health_checks/
